# Railway configuration for NMPL Ecommerce Server
# Docs: https://docs.railway.app/reference/config-as-code

[build]
# Tell Railway to run npm install + npm run build
builder = "NIXPACKS"
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
# Run migrations then start the server
# prisma migrate deploy is safe to re-run — it only applies pending migrations
startCommand = "npx prisma migrate deploy && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
