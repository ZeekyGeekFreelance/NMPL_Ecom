services:
  client:
    build:
      context: ./client
      args:
        APP_ENV: development
    env_file:
      - ./client/.env
    environment:
      INTERNAL_API_URL: http://server:5000/api/v1
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev

  server:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      DOCKER_MODE: "true"
      PORT: "5000"
      PUBLIC_API_BASE_URL: http://localhost:5000
      CLIENT_URL_DEV: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:5173
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run dev"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 60s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
