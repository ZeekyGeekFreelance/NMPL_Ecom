services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready is built into the official postgres image — no wget needed.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20        # up to 100 s of retries before giving up
      start_period: 15s  # allow init scripts to complete first
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  server:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      DOCKER_MODE: "true"
      PORT: "5000"
      PUBLIC_API_BASE_URL: http://${HOST_MACHINE_IP:-localhost}:5000
      CLIENT_URL_DEV: http://${HOST_MACHINE_IP:-localhost}:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://${HOST_MACHINE_IP:-localhost}:3000
      COOKIE_DOMAIN: ""
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public&sslmode=disable&connection_limit=20&pool_timeout=20
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public&sslmode=disable
      REDIS_ENABLED: "true"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5000:5000"
    # Server waits for DB + Redis to be HEALTHY (not just started).
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    # Startup sequence:
    #   1. Override URLs so Prisma CLI uses db:5432 (Docker network), not .env localhost.
    #   2. prisma migrate deploy — apply all pending migrations (idempotent, safe to re-run).
    #   3. npm run start:docker — compile the server and run the built dist entrypoint.
    command: >-
      sh -c "
        export DATABASE_URL='postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public&sslmode=disable&connection_limit=20&pool_timeout=20' &&
        export DIRECT_URL='postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public&sslmode=disable' &&
        npx prisma migrate deploy &&
        npm run start:docker
      "
    # ── Readiness probe ──────────────────────────────────────────────────────
    # Uses Node.js built-in http module — more reliable than wget on Alpine
    # because it correctly handles 503 responses during the startup phase
    # (db connecting) without falling back to the pipe-grep approach which
    # can silently succeed on an empty stdout.
    #
    # The probe checks: server is listening + DB is connected + serverReady=true.
    # The client container will NOT start until this probe succeeds.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - |
          const http = require('http');
          const req = http.get('http://localhost:5000/health', (res) => {
            let body = '';
            res.on('data', (chunk) => { body += chunk; });
            res.on('end', () => {
              try {
                const json = JSON.parse(body);
                process.exit(json.healthy === true ? 0 : 1);
              } catch (e) {
                process.exit(1);
              }
            });
          });
          req.on('error', () => process.exit(1));
          req.setTimeout(5000, () => { req.destroy(); process.exit(1); });
      interval: 10s
      timeout: 8s
      retries: 30         # 30 × 10 s = 300 s window — covers migrate + generate + cold-start
      start_period: 120s  # suppress failures during migrate + compile on cold dev boots
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        APP_ENV: development
    env_file:
      - ./client/.env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://${HOST_MACHINE_IP:-localhost}:5000/api/v1
      INTERNAL_API_URL: http://server:5000/api/v1
      NEXT_PUBLIC_PLATFORM_NAME: NMPL
      NEXT_PUBLIC_SUPPORT_EMAIL: support@nmpl.online
      DOCKER_MODE: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    # Client does NOT start until server reports healthy.
    # By that point: DB connected, migrations applied, GraphQL serving.
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev:docker
    restart: unless-stopped

volumes:
  pgdata:
