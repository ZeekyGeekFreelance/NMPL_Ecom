services:
  client:
    build:
      context: ./client
      args:
        APP_ENV: development
    env_file:
      - ./client/.env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_PLATFORM_NAME: NMPL
      NEXT_PUBLIC_SUPPORT_EMAIL: support@example.com
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev

  server:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      DOCKER_MODE: "true"
      PORT: "5000"
      PUBLIC_API_BASE_URL: http://localhost:5000
      DATABASE_URL: postgresql://jhaecom:jhaecom27@db:5432/b2c_ecommerce?schema=public&sslmode=disable&connection_limit=20&pool_timeout=20
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev -- --legacy-watch

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: jhaecom
      POSTGRES_PASSWORD: jhaecom27
      POSTGRES_DB: b2c_ecommerce
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
