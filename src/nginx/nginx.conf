worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;

    # ── Security headers (applied globally) ────────────────────────────────
    add_header X-Frame-Options         "DENY"            always;
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;

    # ── Rate limiting zones ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/s;

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name nmpl.in www.nmpl.in api.nmpl.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend — nmpl.in + www.nmpl.in ───────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name nmpl.in www.nmpl.in;

        ssl_certificate     /etc/nginx/certs/nmpl.in.crt;
        ssl_certificate_key /etc/nginx/certs/nmpl.in.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # www → apex redirect
        if ($host = www.nmpl.in) {
            return 301 https://nmpl.in$request_uri;
        }

        location / {
            proxy_pass         http://client:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── Backend API — api.nmpl.in ───────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name api.nmpl.in;

        ssl_certificate     /etc/nginx/certs/nmpl.in.crt;
        ssl_certificate_key /etc/nginx/certs/nmpl.in.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Health check (no rate limit — needed by Docker + UptimeRobot) ──
        location /health {
            proxy_pass         http://server:5000/health;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Auth endpoints — tighter rate limit ────────────────────────────
        location ~ ^/api/v1/auth/(signin|signup|forgot-password|reset-password) {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://server:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Stripe webhook — raw body, no buffering ─────────────────────────
        location /api/v1/webhook {
            proxy_pass             http://server:5000;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            client_body_buffer_size 1m;
        }

        # ── All other API + GraphQL traffic ────────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://server:5000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 10m;
        }
    }
}
