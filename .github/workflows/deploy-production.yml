# GitHub Actions — Disabled

CI/CD is handled by a local deploy script instead of GitHub Actions to avoid
consuming free-tier minutes.

To deploy to production, run from the repo root:

```bash
# One-time: install CLIs and authenticate
npm install -g @railway/cli vercel
railway login
vercel login

# Every deploy:
npm run deploy
```

See `scripts/deploy.js` for the full deploy sequence.

## If you later want to re-enable GitHub Actions

Rename this file back to `deploy-production.yml` and the workflow will
resume triggering on pushes to `main`.
